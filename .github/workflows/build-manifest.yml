name: Build vin-icons.json
on:
  push:
    branches: [main]
    paths: ['icons/**', 'build_manifest.py', '.github/workflows/build-manifest.yml']
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: build-manifest
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: python3 build_manifest.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vin-icons.json
          if git diff --cached --quiet; then
            echo "unchanged"
          else
            git commit -m "chore: rebuild vin-icons.json" && git push
          fi
